<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#1a73e8">
<title>AI 口语陪练</title>
<script src="https://cdn.jsdelivr.net/npm/marked@18.0.5/lib/marked.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
<style>
  :root {
    --blue: #1a73e8;
    --blue-hover: #1765cc;
    --text: #202124;
    --text-secondary: #5f6368;
    --border: #dadce0;
    --bg: #fff;
    --bg-soft: #f8f9fa;
    --green: #1e8e3e;
    --red: #d93025;
    --me: #e8f0fe;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 14px; line-height: 1.5;
    height: 100dvh; display: flex; flex-direction: column;
  }
  header {
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between;
    flex: none;
  }
  header h1 { margin: 0; font-size: 18px; font-weight: 400; color: var(--text-secondary); }
  header h1 b { color: var(--text); font-weight: 500; }
  .back-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
    border-radius: 4px; padding: 6px 12px; font-size: 13px; cursor: pointer;
  }
  .back-btn:hover { background: var(--bg-soft); }
  .back-btn[hidden] { display: none; }

  main { flex: 1; min-height: 0; display: flex; }
  .wrap { max-width: 880px; width: 100%; margin: 0 auto; padding: 24px; display: flex; flex-direction: column; min-height: 0; }

  /* 角色选择 */
  #picker { display: flex; flex-direction: column; }
  #picker .lead { font-size: 22px; font-weight: 400; color: var(--text); margin: 4px 0 4px; }
  #picker .sub { color: var(--text-secondary); margin: 0 0 24px; max-width: 52ch; }
  .cards {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 1px; background: var(--border); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
  }
  .card {
    background: var(--bg); border: none; text-align: left; cursor: pointer;
    padding: 20px; transition: background 0.12s; font-family: inherit;
    display: flex; flex-direction: column; gap: 6px;
  }
  .card:hover { background: var(--bg-soft); }
  .card .emoji { font-size: 26px; }
  .card .lvl { font-size: 11px; color: var(--blue); text-transform: uppercase; letter-spacing: 0.8px; }
  .card h3 { margin: 0; font-size: 16px; font-weight: 500; }
  .card .desc { color: var(--text-secondary); font-size: 13px; line-height: 1.45; }

  /* 对话 */
  #chat { display: none; flex-direction: column; flex: 1; min-height: 0; }
  .convo-head {
    display: flex; align-items: center; gap: 10px; padding-bottom: 12px;
    border-bottom: 1px solid var(--border); margin-bottom: 4px;
  }
  .convo-head .av { width: 30px; height: 30px; border-radius: 50%; background: var(--bg-soft); display: grid; place-items: center; font-size: 16px; }
  .convo-head .name { font-weight: 500; font-size: 15px; }
  .convo-head .name span { color: var(--text-secondary); font-weight: 400; font-size: 13px; margin-left: 6px; }

  #stream { flex: 1; overflow-y: auto; padding: 18px 2px; display: flex; flex-direction: column; gap: 14px; }

  .row { display: flex; gap: 10px; max-width: 86%; }
  .row.me { align-self: flex-end; flex-direction: row-reverse; }
  .av-s { width: 30px; height: 30px; flex: none; border-radius: 50%; display: grid; place-items: center; font-size: 15px; background: var(--bg-soft); }
  .bubble {
    background: var(--bg-soft); border: 1px solid var(--border);
    border-radius: 12px; border-top-left-radius: 3px;
    padding: 10px 14px; font-size: 15px; line-height: 1.55; position: relative;
  }
  .me .bubble { background: var(--me); border-color: #d2e3fc; border-top-left-radius: 12px; border-top-right-radius: 3px; }
  /* 气泡内 markdown 元素 */
  .bubble .txt > :first-child { margin-top: 0; }
  .bubble .txt > :last-child { margin-bottom: 0; }
  .bubble .txt p { margin: 0 0 8px; }
  .bubble .txt strong { font-weight: 600; }
  .bubble .txt em { font-style: italic; }
  .bubble .txt ul, .bubble .txt ol { margin: 6px 0; padding-left: 20px; }
  .bubble .txt li { margin: 2px 0; }
  .bubble .txt code { background: rgba(0,0,0,0.05); padding: 1px 5px; border-radius: 4px; font-size: 13px; font-family: "SF Mono", Menlo, Consolas, monospace; }
  .bubble .txt pre { background: rgba(0,0,0,0.05); padding: 10px; border-radius: 6px; overflow-x: auto; margin: 8px 0; }
  .bubble .txt pre code { background: none; padding: 0; }
  .bubble .txt a { color: var(--blue); }
  .bubble .txt blockquote { margin: 6px 0; padding-left: 10px; border-left: 3px solid var(--border); color: var(--text-secondary); }
  .bubble .speak {
    position: absolute; bottom: 4px; right: 6px; background: transparent; border: none;
    color: var(--text-secondary); cursor: pointer; font-size: 12px; opacity: 0; transition: opacity 0.12s; padding: 2px;
  }
  .row:hover .bubble .speak { opacity: 0.7; }
  .bubble .speak:hover { opacity: 1; }

  .correction {
    display: block; margin-bottom: 8px; padding: 7px 10px; border-radius: 8px;
    background: #fce8e6; border: 1px solid #f5c6c2; font-size: 13px; line-height: 1.45;
  }
  .correction .lab { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--red); display: block; margin-bottom: 2px; }
  .correction s { color: var(--red); }
  .correction strong { color: var(--green); font-weight: 600; }

  .typing { display: inline-block; width: 7px; height: 15px; background: var(--blue); vertical-align: -2px; animation: blink 1s steps(2) infinite; }
  @keyframes blink { 0%,50%{opacity:1} 50.01%,100%{opacity:0} }

  /* 输入区 */
  .composer { display: flex; gap: 8px; align-items: flex-end; padding-top: 14px; border-top: 1px solid var(--border); }
  .composer textarea {
    flex: 1; resize: none; border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; font-family: inherit; font-size: 15px; line-height: 1.4; color: var(--text);
    outline: none; max-height: 110px;
  }
  .composer textarea:focus { border-color: var(--blue); }
  .mic-btn {
    width: 42px; height: 42px; flex: none; border: 1px solid var(--border); background: var(--bg);
    border-radius: 8px; cursor: pointer; font-size: 16px;
  }
  .mic-btn:hover { background: var(--bg-soft); }
  .mic-btn.rec { background: var(--red); border-color: var(--red); color: #fff; }
  .send-btn {
    background: var(--blue); color: #fff; border: none; border-radius: 8px;
    padding: 0 22px; height: 42px; font-size: 14px; font-weight: 500; cursor: pointer; letter-spacing: 0.5px;
  }
  .send-btn:hover { background: var(--blue-hover); }
  .send-btn:disabled { background: #c4c7c5; cursor: default; }
  .err { color: var(--red); font-size: 13px; padding: 6px 0 0; min-height: 20px; }

  @media (max-width: 720px) {
    .wrap { padding: 12px; }
    header { padding: 10px 14px; }
  }
</style>
</head>
<body>
  <header>
    <h1><b>AI 口语陪练</b> 听说练习</h1>
    <div style="display:flex; gap:8px;">
      <button class="back-btn" id="resetBtn" hidden>🗑 清空对话</button>
      <button class="back-btn" id="backBtn" hidden>↩ 换角色</button>
    </div>
  </header>

  <main>
    <div class="wrap">
      <div id="picker">
        <p class="lead">挑一个角色，开口聊。</p>
        <p class="sub">对方会用英文回应、念出声音，并在你说错时轻轻纠正。重点是开口，不是背单词。</p>
        <div class="cards" id="cards"></div>
      </div>

      <div id="chat">
        <div class="convo-head">
          <div class="av" id="headAv"></div>
          <div class="name" id="headName"></div>
        </div>
        <div id="stream"></div>
        <div class="err" id="err"></div>
        <div class="composer">
          <button class="mic-btn" id="micBtn" title="语音输入">🎙️</button>
          <textarea id="input" rows="1" placeholder="打字，或点麦克风开口说…"></textarea>
          <button class="send-btn" id="sendBtn">发送</button>
        </div>
      </div>
    </div>
  </main>

<script type="module">
import { SCENARIOS } from '/scenarios.js';

const ENDPOINT = "/chat";

let scenario=null, history=[], streaming=false;

/* ---------- session 持久化 ---------- */
const SESSION_KEY='speakeasy_sessions_v1';
function loadSessions(){
  try{ return JSON.parse(localStorage.getItem(SESSION_KEY)) || {}; }catch(e){ return {}; }
}
function saveSession(){
  if(!scenario) return;
  try{
    const all=loadSessions();
    all[scenario]=history.slice(-40); // 每个角色最多存 40 条
    localStorage.setItem(SESSION_KEY, JSON.stringify(all));
  }catch(e){ /* 隐私模式/超额，忽略 */ }
}
function clearSession(key){
  try{ const all=loadSessions(); delete all[key]; localStorage.setItem(SESSION_KEY, JSON.stringify(all)); }catch(e){}
}
// 从 history 重建可见气泡（纠错卡片为即时教学，恢复时不重建）
function restoreBubbles(){
  streamEl.innerHTML='';
  for(const m of history){
    if(m.role!=='user' && m.role!=='assistant') continue;
    const ab=addBubble(m.role==='user'?'user':'ai', '');
    if(m.role==='user'){ ab.span.textContent=m.content; }
    else{ renderMd(ab.span, m.content); }
  }
  streamEl.scrollTop=streamEl.scrollHeight;
}
const $=id=>document.getElementById(id);
const cardsEl=$('cards'), pickerEl=$('picker'), chatEl=$('chat'),
      streamEl=$('stream'), inputEl=$('input'), sendBtn=$('sendBtn'),
      micBtn=$('micBtn'), errEl=$('err'), backBtn=$('backBtn'), resetBtn=$('resetBtn');

Object.entries(SCENARIOS).forEach(([key,s])=>{
  const c=document.createElement('button');
  c.className='card';
  c.innerHTML='<span class="emoji">'+s.emoji+'</span>'+
    '<span class="lvl">'+s.level+'</span>'+
    '<h3>'+s.role+' \u00b7 '+s.title+'</h3>'+
    '<span class="desc">'+s.desc+'</span>';
  c.onclick=()=>startScenario(key);
  cardsEl.appendChild(c);
});

function startScenario(key){
  scenario=key;
  const s=SCENARIOS[key];
  $('headAv').textContent=s.emoji;
  $('headName').innerHTML=s.role+' <span>\u00b7 '+s.title+' \u00b7 '+s.level+'</span>';
  pickerEl.style.display='none';
  chatEl.style.display='flex';
  backBtn.hidden=false;
  resetBtn.hidden=false;
  errEl.textContent='';

  const saved=loadSessions()[key];
  if(saved && saved.length){
    history=saved;
    restoreBubbles();
  }else{
    history=[];
    streamEl.innerHTML='';
    send(null, true);
  }
}
backBtn.onclick=()=>{
  if(streaming) return;
  if('speechSynthesis' in window) speechSynthesis.cancel();
  chatEl.style.display='none'; pickerEl.style.display='flex'; backBtn.hidden=true; resetBtn.hidden=true;
};
resetBtn.onclick=()=>{
  if(streaming || !scenario) return;
  if('speechSynthesis' in window) speechSynthesis.cancel();
  clearSession(scenario);
  history=[];
  streamEl.innerHTML=''; errEl.textContent='';
  send(null, true);
};

function addBubble(role, text){
  text=text||"";
  const row=document.createElement('div');
  row.className='row '+(role==='user'?'me':'ai');
  const av=document.createElement('div'); av.className='av-s';
  av.textContent = role==='user' ? '\ud83d\ude42' : SCENARIOS[scenario].emoji;
  const b=document.createElement('div'); b.className='bubble';
  const span=document.createElement('span'); span.className='txt'; span.textContent=text;
  b.appendChild(span);
  if(role!=='user'){
    const sp=document.createElement('button'); sp.className='speak'; sp.textContent='\ud83d\udd0a';
    sp.onclick=()=>speak(span.dataset.plain || span.textContent); b.appendChild(sp);
  }
  row.appendChild(av); row.appendChild(b);
  streamEl.appendChild(row);
  streamEl.scrollTop=streamEl.scrollHeight;
  return {bubble:b,span:span};
}
function esc(s){return s.replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
// 容错解析纠错标签：兼容闭合标签写歪/缺失的情况
function parseCorrection(raw){
  // 必须有开标签才尝试解析；流式中开标签还没出现时直接原样显示
  const openIdx=raw.indexOf('[[correction]]');
  if(openIdx<0) return {corr:null, body:raw};

  const after=raw.slice(openIdx+14); // 14 = '[[correction]]'.length
  // 依次尝试多种闭合写法：标准 -> 残缺 -> 换行兜底
  let inner=null, rest='';
  const m=after.match(/^([\s\S]*?)(\[\[\/correction\]\]|\[\/correction\]\]|\[\[\/?correction\]?\]|\]\])/);
  if(m){
    inner=m[1];
    rest=after.slice(m.index+m[0].length);
  }else{
    // 还没等到闭合标签：可能仍在流式输出中。
    // 用换行做兜底——纠错内容通常单行，遇到换行就认为结束。
    const nl=after.indexOf('\n');
    if(nl>=0){ inner=after.slice(0,nl); rest=after.slice(nl); }
    else return {corr:'__pending__', body:''}; // 标签未闭合且无换行，先不渲染正文
  }

  // 解析 inner: "wrong -> right | reason"
  const pipe=inner.split('|');
  const fix=(pipe[0]||'').split(/->|\u2192/); // 兼容 -> 和 →
  const wrong=(fix[0]||'').trim();
  const right=(fix[1]||'').trim();
  const reason=(pipe.slice(1).join('|')||'').trim();

  // 兜底：左右相同 / 缺失 / 自我否定式纠错（"你的答案完全正确"），一律丢弃
  const norm=s=>s.replace(/\s+/g,' ').trim().toLowerCase();
  const bodyText=(rest||'').replace(/^\s*\n?/,'').trim();
  const looksLikeNonCorrection=/correct|正确|不需要纠正|no correction|无需/i.test(reason);
  if(!wrong || !right || norm(wrong)===norm(right) || looksLikeNonCorrection){
    return { corr:null, body: bodyText || raw };
  }
  return { corr:{wrong,right,reason}, body: bodyText };
}

// 把 markdown 文本渲染成安全 HTML 写入元素；同时在 dataset 里存纯文本供 TTS 使用
function renderMd(el, text){
  const html = DOMPurify.sanitize(marked.parse(text || '', {breaks:true}));
  el.innerHTML = html;
  el.dataset.plain = (text || '').trim(); // 朗读用原始文本，避免把符号念出来
}

function renderAi(bubble, span, raw){
  const {corr, body}=parseCorrection(raw);
  let corrEl=bubble.querySelector('.correction');
  if(corr && corr!=='__pending__'){
    if(!corrEl){ corrEl=document.createElement('div'); corrEl.className='correction'; bubble.insertBefore(corrEl, span); }
    corrEl.innerHTML='<span class="lab">\u63d0\u793a</span><s>'+esc(corr.wrong)+'</s> \u2192 <strong>'+esc(corr.right)+'</strong>'+(corr.reason?' \u00b7 '+esc(corr.reason):'');
    renderMd(span, body);
  }else if(corr==='__pending__'){
    renderMd(span, '');
  }else{
    renderMd(span, body);
  }
}

let voice=null;
function pickVoice(){
  const vs=speechSynthesis.getVoices();
  voice=vs.find(v=>/en-US/i.test(v.lang)&&/female|samantha|zira|aria/i.test(v.name))
    || vs.find(v=>/en-US/i.test(v.lang)) || vs.find(v=>/^en/i.test(v.lang)) || null;
}
if('speechSynthesis' in window){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
function speak(text){
  if(!('speechSynthesis' in window)||!text) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  if(voice) u.voice=voice;
  u.rate=scenario==='barista'?0.92:1.0;
  speechSynthesis.speak(u);
}

const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let recog=null, recording=false;
if(SR){
  recog=new SR(); recog.lang='en-US'; recog.interimResults=true; recog.continuous=false;
  let base='';
  recog.onstart=()=>{recording=true; micBtn.classList.add('rec'); base=inputEl.value?inputEl.value+' ':'';};
  recog.onresult=e=>{ let t=''; for(let i=e.resultIndex;i<e.results.length;i++) t+=e.results[i][0].transcript; inputEl.value=base+t; autosize(); };
  recog.onend=()=>{recording=false; micBtn.classList.remove('rec');};
  recog.onerror=()=>{recording=false; micBtn.classList.remove('rec');};
}else{ micBtn.style.display='none'; }
micBtn.onclick=()=>{ if(!recog) return; recording?recog.stop():recog.start(); };

async function send(userText, isOpener){
  if(streaming) return;
  errEl.textContent='';
  if(!isOpener){
    if(!userText.trim()) return;
    addBubble('user', userText);
    history.push({role:'user', content:userText});
  }
  // opener: 不写入 history，后端凭 messages 为空判定为开场

  streaming=true; sendBtn.disabled=true;
  const ab=addBubble('ai',''); const bubble=ab.bubble, span=ab.span;
  const cursor=document.createElement('span'); cursor.className='typing'; bubble.appendChild(cursor);

  let raw='';
  try{
    const res=await fetch(ENDPOINT,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({scenario:scenario, messages:history})
    });
    if(!res.ok||!res.body) throw new Error('\u670d\u52a1\u5f02\u5e38 '+res.status);
    const reader=res.body.getReader(), dec=new TextDecoder();
    let buf='';
    while(true){
      const r=await reader.read();
      if(r.done) break;
      buf+=dec.decode(r.value,{stream:true});
      let idx;
      while((idx=buf.indexOf('\n\n'))>=0){
        const frame=buf.slice(0,idx); buf=buf.slice(idx+2);
        const evM=/event:\s*(.*)/.exec(frame); const ev=evM?evM[1].trim():null;
        const dM=/data:\s*([\s\S]*)/.exec(frame); const dataLine=dM?dM[1]:null;
        if(!dataLine) continue;
        let p; try{p=JSON.parse(dataLine);}catch(e){continue;}
        if(ev==='token'){ raw+=p.text; renderAi(bubble, span, raw); streamEl.scrollTop=streamEl.scrollHeight; }
        else if(ev==='error'){ throw new Error(p.message||'\u6d41\u5f0f\u9519\u8bef'); }
      }
    }
  }catch(e){ errEl.textContent='\u26a0 '+e.message; }
  finally{ cursor.remove(); streaming=false; sendBtn.disabled=false; }

  const parsed=parseCorrection(raw);
  const clean=(parsed.corr&&parsed.corr!=='__pending__')?parsed.body
    : raw.replace(/\[\[correction\]\][\s\S]*?(\[\[\/correction\]\]|\]\])/,'').trim();

  if(clean){
    history.push({role:'assistant', content:clean});
    if(!SCENARIOS[scenario].mode){
      const spoken=(typeof DOMPurify!=='undefined'&&typeof marked!=='undefined')
        ? new DOMParser().parseFromString(DOMPurify.sanitize(marked.parse(clean)),'text/html').body.textContent
        : clean;
      speak(spoken);
    }
  }else{
    // 空回复：移除空气泡，回滚刚加入的用户消息，避免 history 出现连续 user 导致后续请求失败
    bubble.parentElement && bubble.parentElement.remove();
    if(!isOpener && history.length && history[history.length-1].role==='user'){
      history.pop();
    }
    if(!errEl.textContent){
      errEl.textContent='\u26a0 \u6ca1\u6709\u6536\u5230\u56de\u590d\uff0c\u8bf7\u91cd\u8bd5\u3002'; // 没有收到回复，请重试。
    }
  }
  saveSession();
  inputEl.focus();
}

function autosize(){ inputEl.style.height='auto'; inputEl.style.height=Math.min(inputEl.scrollHeight,110)+'px'; }
inputEl.addEventListener('input', autosize);
inputEl.addEventListener('keydown', e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); fire(); } });
sendBtn.onclick=fire;
function fire(){
  if(recording&&recog) recog.stop();
  const t=inputEl.value; if(!t.trim()) return;
  inputEl.value=''; autosize(); send(t);
}
</script>
</body>
</html>
